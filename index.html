<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/kubersiteicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/kubersiteicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/kubersiteicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- title, description, canonical, og:title/description/url, twitter:title/description
         are set per-route via the <Seo> component (src/components/Seo.tsx) -->
    <title>Kuber Tech Solutions</title>

    <!-- Open Graph (static, sitewide fallbacks) -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://kubertechsolutions.in/logos/KuberTechLogo.png" />
    <meta property="og:site_name" content="Kuber Tech Solutions" />

    <!-- Twitter Card (static, sitewide fallbacks) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://kubertechsolutions.in/logos/KuberTechLogo.png" />

    <!-- Extra SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Kuber Tech Solutions" />
    <meta name="keywords" content="Kuber Tech Solutions, full-stack development, cloud infrastructure, AI integration, production AI systems, RAG, LLM integration, AI engineering, web development India, software engineering, performance engineering" />

    <!-- Organization schema is rendered per-route via <Seo> on the homepage (src/App.tsx) -->
